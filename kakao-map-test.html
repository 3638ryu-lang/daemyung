<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>카카오맵 테스트</title>
</head>
<body>
    <h1>카카오맵 테스트 페이지</h1>
    <p>이 페이지는 카카오맵 API 작동 여부를 테스트하기 위한 페이지입니다.</p>
    
    <!-- 지도를 표시할 div -->
    <div id="map" style="width:100%;height:500px;"></div>
    
    <!-- 카카오맵 API 스크립트 -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=8f167b2f05f56acd48780cc0c6f56843"></script>
    
    <!-- 지도 생성 코드 -->
    <script>
        var container = document.getElementById('map'); // 지도를 담을 영역
        var options = {
            center: new kakao.maps.LatLng(37.5244, 126.8957), // 대명한의원 좌표
            level: 3 // 확대 레벨
        };
        
        var map = new kakao.maps.Map(container, options); // 지도 생성
        
        // 마커 표시
        var markerPosition = new kakao.maps.LatLng(37.5244, 126.8957);
        var marker = new kakao.maps.Marker({
            position: markerPosition
        });
        marker.setMap(map);
        
        // 인포윈도우 표시
        var infowindow = new kakao.maps.InfoWindow({
            content: '<div style="padding:5px;font-size:12px;"><strong>대명한의원</strong><br>서울 영등포구 양평로 105<br>원우빌딩 3층</div>'
        });
        infowindow.open(map, marker);
        
        console.log('✅ 카카오맵이 정상적으로 로드되었습니다!');
    </script>
</body>
</html>
